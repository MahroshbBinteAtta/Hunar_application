<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HUNAR - Pakistan's informal labor marketplace</title>
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
      })();
    </script>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        var div = document.createElement('div');
        div.id = 'runtime-error-banner';
        div.style.position = 'fixed';
        div.style.top = '10px';
        div.style.left = '10px';
        div.style.right = '10px';
        div.style.backgroundColor = '#e11d48';
        div.style.color = 'white';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.borderRadius = '12px';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '13px';
        div.style.lineHeight = '1.5';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
        div.innerHTML = '<h3 style="margin:0 0 10px 0;font-size:16px;font-weight:bold;">🚨 Frontend Runtime Error Detected</h3>' + 
                        '<strong>Message:</strong> ' + message + '<br>' +
                        '<strong>File:</strong> ' + source + ':' + lineno + ':' + colno + 
                        (error && error.stack ? '<br><br><strong>Stack Trace:</strong><br>' + error.stack : '');
        document.body.appendChild(div);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var div = document.createElement('div');
        div.id = 'runtime-error-banner-rejection';
        div.style.position = 'fixed';
        div.style.top = '10px';
        div.style.left = '10px';
        div.style.right = '10px';
        div.style.backgroundColor = '#e11d48';
        div.style.color = 'white';
        div.style.padding = '20px';
        div.style.zIndex = '999999';
        div.style.borderRadius = '12px';
        div.style.fontFamily = 'monospace';
        div.style.fontSize = '13px';
        div.style.lineHeight = '1.5';
        div.style.whiteSpace = 'pre-wrap';
        div.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
        div.innerHTML = '<h3 style="margin:0 0 10px 0;font-size:16px;font-weight:bold;">🚨 Unhandled Promise Rejection</h3>' +
                        '<strong>Reason:</strong> ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown reason') +
                        (event.reason && event.reason.stack ? '<br><br><strong>Stack Trace:</strong><br>' + event.reason.stack : '');
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body class="bg-[var(--color-bg)] text-[var(--color-text)] transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
